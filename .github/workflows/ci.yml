name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  frontend-quality:
    name: Frontend quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install frontend deps
        working-directory: apps/web
        run: npm ci
      - name: Typecheck + tests + build
        working-directory: apps/web
        run: npm run quality:ci

  frontend-e2e:
    name: Frontend e2e (Playwright)
    runs-on: ubuntu-latest
    needs: frontend-quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install frontend deps
        working-directory: apps/web
        run: npm ci
      - name: Install Playwright browser
        working-directory: apps/web
        run: npx playwright install --with-deps chromium
      - name: Run Playwright tests
        working-directory: apps/web
        run: npm run e2e

  backend-quality:
    name: Backend build + prisma + e2e
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: mtm
          POSTGRES_PASSWORD: mtm
          POSTGRES_DB: mtm
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mtm -d mtm"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://mtm:mtm@localhost:5432/mtm
      JWT_ACCESS_SECRET: mtm-access-dev-secret
      JWT_REFRESH_SECRET: mtm-refresh-dev-secret
      ALLOW_PLAIN_PIN_LOGIN: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/api/package-lock.json
      - name: Install backend deps
        working-directory: apps/api
        run: npm ci
      - name: Prisma generate
        working-directory: apps/api
        run: npm run prisma:generate
      - name: Prisma validate
        working-directory: apps/api
        run: npm run prisma:validate
      - name: Prisma migrate deploy
        working-directory: apps/api
        run: npm run prisma:migrate:deploy
      - name: Backend build
        working-directory: apps/api
        run: npm run build
      - name: Backend e2e
        working-directory: apps/api
        run: npm run test:e2e

  docker-build:
    name: Docker build front + api
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build frontend image
        run: docker build -f apps/web/Dockerfile -t mtm-frontend:ci ./apps/web
      - name: Build api image
        run: docker build -f apps/api/Dockerfile -t mtm-api:ci ./apps/api
