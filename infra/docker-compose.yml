services:
  frontend:
    container_name: mtm_frontend_dev
    build:
      context: ../apps/web
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ../apps/web:/app
      - /app/node_modules
    environment:
      NODE_ENV: development
      VITE_DATA_SOURCE: ${VITE_DATA_SOURCE:-api}
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:4000/api}
    command: npm run dev -- --host 0.0.0.0 --port 3000
    profiles: ["dev", "fullstack"]
    depends_on:
      - api

  frontend_prod:
    container_name: mtm_frontend_prod
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    ports:
      - "4173:4173"
    environment:
      NODE_ENV: production
    profiles: ["prod"]

  api:
    container_name: mtm_api_dev
    build:
      context: ../apps/api
      dockerfile: Dockerfile.dev
    ports:
      - "4000:4000"
    volumes:
      - ../apps/api:/app
      - /app/node_modules
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgresql://mtm:mtm@db:5432/mtm
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-mtm-access-dev-secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-mtm-refresh-dev-secret}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-7d}
      ALLOW_PLAIN_PIN_LOGIN: ${ALLOW_PLAIN_PIN_LOGIN:-true}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000,http://localhost:4173,http://127.0.0.1:4173}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-100}
    command: sh -c "npm ci && npx prisma generate && npm run start:dev"
    depends_on:
      db:
        condition: service_healthy
    profiles: ["dev", "backend", "fullstack"]

  api_prod:
    container_name: mtm_api_prod
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    ports:
      - "4001:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://mtm:mtm@db:5432/mtm
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-me-in-prod-access}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-in-prod-refresh}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-7d}
      ALLOW_PLAIN_PIN_LOGIN: ${ALLOW_PLAIN_PIN_LOGIN:-false}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-change-me-in-prod-origin}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-100}
    depends_on:
      db:
        condition: service_healthy
    profiles: ["prod", "backend"]

  db:
    container_name: mtm_db
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: mtm
      POSTGRES_PASSWORD: mtm
      POSTGRES_DB: mtm
    volumes:
      - mtm_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mtm -d mtm"]
      interval: 5s
      timeout: 3s
      retries: 20
    profiles: ["dev", "prod", "backend", "fullstack"]

volumes:
  mtm_db_data:
