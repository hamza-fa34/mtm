services:
  frontend:
    container_name: mtm_frontend_dev
    build:
      context: ../apps/web
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ../apps/web:/app
      - /app/node_modules
    environment:
      NODE_ENV: development
      VITE_DATA_SOURCE: ${VITE_DATA_SOURCE:-local}
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:4000/api}
    command: npm run dev -- --host 0.0.0.0 --port 3000
    profiles: ["dev", "fullstack"]
    depends_on:
      - api

  frontend_prod:
    container_name: mtm_frontend_prod
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    ports:
      - "4173:4173"
    environment:
      NODE_ENV: production
    profiles: ["prod"]

  api:
    container_name: mtm_api_dev
    build:
      context: ../apps/api
      dockerfile: Dockerfile.dev
    ports:
      - "4000:4000"
    volumes:
      - ../apps/api:/app
      - /app/node_modules
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgresql://mtm:mtm@db:5432/mtm
    command: sh -c "npm ci && npx prisma generate && npm run start:dev"
    depends_on:
      db:
        condition: service_healthy
    profiles: ["dev", "backend", "fullstack"]

  api_prod:
    container_name: mtm_api_prod
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    ports:
      - "4001:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://mtm:mtm@db:5432/mtm
    depends_on:
      db:
        condition: service_healthy
    profiles: ["prod", "backend"]

  db:
    container_name: mtm_db
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: mtm
      POSTGRES_PASSWORD: mtm
      POSTGRES_DB: mtm
    volumes:
      - mtm_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mtm -d mtm"]
      interval: 5s
      timeout: 3s
      retries: 20
    profiles: ["dev", "prod", "backend", "fullstack"]

volumes:
  mtm_db_data:
